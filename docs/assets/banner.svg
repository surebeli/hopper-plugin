    <text x="2" y="102" font-size="24" fill="#b7c4cf">Vendor-neutral background dispatch for AI agents</text>
    <text x="2" y="142" font-size="16" fill="#7f95a4" font-family="Consolas, ui-monospace, monospace">.hopper/queue.md -> hopper-dispatch -> vendor CLI -> progress.log -> terminal event</text>
  </g>
  <g transform="translate(650 54)" font-family="Consolas, ui-monospace, monospace" font-size="15">
